<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VOIDSCROLL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
<style>
/* --- THEMES --- */
[data-theme="dark"]{--bg:#0e0e0e;--tx:#f0f0f0;--tx2:rgba(240,240,240,0.5);--acc:#fff;--bdr:rgba(255,255,255,0.1);--tagbg:rgba(255,255,255,0.07);--tagbdr:rgba(255,255,255,0.13);--ob:linear-gradient(to top,rgba(14,14,14,0.78) 0%,rgba(14,14,14,0.18) 45%,transparent 68%);--ot:linear-gradient(to bottom,rgba(14,14,14,0.7) 0%,transparent 28%);--prog:#fff;--btnbg:rgba(14,14,14,0.6);--btnbdr:rgba(255,255,255,0.14);--fm:"IBM Plex Mono",monospace;--stbg:rgba(14,14,14,0.82);--vig:rgba(0,0,0,0.28)}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:var(--tx);font-family:"Space Grotesk",sans-serif;touch-action:none;user-select:none;-webkit-user-select:none}

/* --- FEED --- */
#feed{position:fixed;inset:0;z-index:1}
.card{position:absolute;inset:0;background:#000;will-change:transform;overflow:hidden}
.card video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .8s ease, object-fit 0.3s ease}
.card video.vis{opacity:1}
.card video.contain { object-fit: contain; }

/* --- UI --- */
.ctrl-strip { position: fixed; left: 12px; top: 50%; transform: translateY(-50%); z-index: 50; display: flex; flex-direction: column; gap: 14px; }
.side-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--btnbg); border: 1px solid var(--btnbdr); backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--tx2); transition: all .2s; font-size: 1.1rem; }
.side-btn.active { color: var(--acc); border-color: var(--acc); }
.side-btn.low-stim-on { background: #90be6d; color: #000; border-color: #90be6d; }

.hdr{position:fixed;top:0;left:0;right:0;z-index:100;padding:12px;background:var(--ot);backdrop-filter:blur(5px);transform:translateY(-110%);transition:transform .3s ease}
.hdr.vis{transform:translateY(0)}
.cat-grid{display:flex; overflow-x:auto; gap:8px; padding-bottom:10px; scrollbar-width: none;}
.chip{padding:6px 14px; font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase; font-weight:700; border:1px solid var(--bdr); cursor:pointer; transition:all .2s; white-space:nowrap; font-family:var(--fm); color:var(--tx2); background:rgba(255,255,255,0.05); border-radius:100px;}
.chip.on{background:var(--acc); color:var(--bg); border-color:var(--acc)}

/* --- PIN OVERLAY --- */
.pin-overlay { position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); display: none; align-items: center; justify-content: center; flex-direction: column; }
.pin-overlay.open { display: flex; }
.pin-input { background: transparent; border: none; border-bottom: 2px solid #90be6d; color: #90be6d; font-family: 'Bebas Neue'; font-size: 3rem; text-align: center; width: 150px; outline: none; margin: 20px 0; }
.pin-label { font-family: var(--fm); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; }

/* --- UTILS --- */
.skel{position:absolute;inset:0;z-index:2;display:flex;align-items:center;justify-content:center;background:#000;font-family:var(--fm);font-size:0.5rem;color:var(--tx2)}
.card-info{position:absolute;bottom:0;left:0;right:60px;padding:15px 15px 35px;z-index:6; opacity:0; pointer-events:none; transition: opacity .3s}
.card-info.vis{opacity:1; pointer-events:auto}
</style>
</head>
<body data-theme="dark">

<div id="feed"></div>

<div class="ctrl-strip">
    <div class="side-btn" id="lowStimToggle" title="Low Stim Mode">🌿</div>
    <div class="side-btn" id="uiToggle" title="Info">☰</div>
    <div class="side-btn" id="zoomToggle" title="Zoom">⛶</div>
    <div class="side-btn" id="muteBtn" title="Mute">🔊</div>
</div>

<header class="hdr" id="hdr">
    <div id="logo" style="font-family:'Bebas Neue'; font-size:1.5rem; margin-bottom:10px;">VOIDSCROLL</div>
    <div class="cat-grid" id="catGrid">
        <div class="chip on" data-q="all">ALL</div>
        <div class="chip" data-q="animals">ANIMALS</div>
        <div class="chip" data-q="space">SPACE</div>
        <div class="chip" data-q="science">SCIENCE</div>
        <div class="chip" data-q="movies">MOVIES/TV</div>
    </div>
</header>

<div class="pin-overlay" id="pinOverlay">
    <div class="pin-label" id="pinText">ENTER PIN TO LOCK LOW-STIM</div>
    <input type="password" class="pin-input" id="pinInput" inputmode="numeric" maxlength="4">
</div>

<script>
let playlist=[], curIdx=0, muted=true, zoomFill=true, infoVisible=false, transitioning=false;
let lowStimMode=false, savedPin=null, curCard=null;

const getRand = (max) => Math.floor(Math.random() * max) + 1;

// --- LOW STIM SCRAPER MODIFICATIONS ---
async function fetchMedia(q) {
    let query;
    if (lowStimMode) {
        // Target Archive.org Prelinger Archives + Nature + Slow paced content
        // This query looks for "Educational Films" and "Silent films" which are naturally low-stim
        query = "(collection:prelinger OR collection:silent_films) AND (nature OR clouds OR animals OR ocean)";
    } else {
        query = q === 'all' ? "space OR nebula OR nature" : q;
    }
    
    const r = await fetch(`https://archive.org/advancedsearch.php?q=${query}+AND+mediatype:movies&rows=20&start=${getRand(100)}&output=json`);
    const d = await r.json();
    return (d.response.docs || []).map(x => ({
        id: x.identifier,
        title: x.title
    }));
}

async function resolveVideo(item) {
    // Attempting to get the 512kb or original mp4
    return `https://archive.org/download/${item.id}/${item.id}_512kb.mp4`;
}

async function loadContent(q = "all") {
    playlist = (await fetchMedia(q)).sort(() => Math.random() - 0.5);
    renderCard(0, "up");
}

function renderCard(idx, dir) {
    const item = playlist[idx];
    if(!item) return;

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
        <div class="skel">LOADING LOW-STIM FEED...</div>
        <div class="card-info ${infoVisible?'vis':''}">
            <div style="font-size:0.5rem; opacity:0.6; margin-bottom:4px">${lowStimMode ? '🌿 CALM' : 'VOID'}</div>
            <div class="vid-ttl" style="font-weight:700;">${item.title}</div>
        </div>
    `;

    const vid = document.createElement('video');
    vid.loop = true; vid.muted = muted; vid.playsInline = true;
    if(!zoomFill) vid.classList.add('contain');
    
    resolveVideo(item).then(url => {
        vid.src = url;
        vid.onloadeddata = () => {
            card.querySelector('.skel').style.display = 'none';
            vid.classList.add('vis');
            vid.play();
        };
        // If the video fails (common with old archive files), skip to next
        vid.onerror = () => advance("up");
    });

    card.appendChild(vid);
    if(curCard) {
        const old = curCard;
        old.style.transition = 'transform 0.6s cubic-bezier(0.2, 1, 0.2, 1)';
        old.style.transform = dir === "up" ? 'translateY(-100%)' : 'translateY(100%)';
        setTimeout(() => old.remove(), 600);
    }
    document.getElementById('feed').appendChild(card);
    curCard = card;
}

function advance(dir) {
    if(transitioning) return;
    const next = dir === "up" ? curIdx + 1 : curIdx - 1;
    if(next < 0 || next >= playlist.length) return;
    transitioning = true; curIdx = next;
    renderCard(curIdx, dir);
    setTimeout(() => transitioning = false, 600);
}

// --- LOCK LOGIC ---
const stimBtn = document.getElementById('lowStimToggle');
const overlay = document.getElementById('pinOverlay');
const pinInput = document.getElementById('pinInput');

stimBtn.onclick = () => {
    overlay.classList.add('open');
    pinInput.focus();
    document.getElementById('pinText').textContent = lowStimMode ? "ENTER PIN TO UNLOCK" : "SET PIN TO LOCK CALM MODE";
};

pinInput.onkeydown = (e) => {
    if(e.key === "Enter") {
        const val = pinInput.value;
        if(!lowStimMode) {
            savedPin = val;
            lowStimMode = true;
            stimBtn.classList.add('low-stim-on');
            document.getElementById('catGrid').style.display = 'none';
            document.getElementById('logo').textContent = "VOID CALM";
            loadContent();
        } else {
            if(val === savedPin) {
                lowStimMode = false;
                stimBtn.classList.remove('low-stim-on');
                document.getElementById('catGrid').style.display = 'flex';
                document.getElementById('logo').textContent = "VOIDSCROLL";
                loadContent("all");
            }
        }
        overlay.classList.remove('open');
        pinInput.value = "";
    }
};

// --- TOUCH & UI ---
let startY = 0;
window.addEventListener('touchstart', e => { startY = e.touches[0].clientY; });
window.addEventListener('touchmove', e => {
    let dy = e.touches[0].clientY - startY;
    curCard.style.transform = `translateY(${dy}px)`;
});
window.addEventListener('touchend', e => {
    let dy = e.touches[0].clientY - startY;
    if(Math.abs(dy) > 100) advance(dy < 0 ? "up" : "down");
    else curCard.style.transform = 'translateY(0)';
});

document.getElementById('zoomToggle').onclick = () => {
    zoomFill = !zoomFill;
    document.querySelectorAll('video').forEach(v => v.classList.toggle('contain', !zoomFill));
};

document.getElementById('uiToggle').onclick = () => {
    infoVisible = !infoVisible;
    if(curCard) curCard.querySelector('.card-info').classList.toggle('vis', infoVisible);
};

document.getElementById('muteBtn').onclick = () => {
    muted = !muted;
    document.getElementById('muteBtn').innerHTML = muted ? "🔇" : "🔊";
    if(curCard) curCard.querySelector('video').muted = muted;
};

document.getElementById('catGrid').onclick = e => {
    const chip = e.target.closest('.chip');
    if(!chip) return;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
    chip.classList.add('on');
    loadContent(chip.dataset.q);
};

loadContent();
</script>
</body>
</html>

});

document.querySelectorAll("button").forEach(btn => {
  btn.addEventListener("click", () => setCategory(btn.dataset.cat));
});

loadVideos();
</script>
</body>
</html>
