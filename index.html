<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VOIDSCROLL</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#050505">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="manifest" href="manifest.json">
    
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
/* --- THEMES & CORE --- */
:root {
    --bg: #050505;
    --tx: #f0f0f0;
    --ui-bg: rgba(20, 20, 20, 0.6);
    --ui-border: rgba(255, 255, 255, 0.1);
    --accent: #ffffff;
    --radius: 16px;
}

body.kids-mode {
    --bg: #141414; /* Tan */
    --tx: #050505; /* Black */
    --ui-bg: rgba(34, 34, 34, 0.8);
    --ui-border: rgba(5, 5, 5, 0.2);
    --accent: #050505;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--tx); font-family: "Space Grotesk", sans-serif; touch-action: none; user-select: none; -webkit-user-select: none; transition: background 0.5s, color 0.5s; }

/* --- CRT ANIMATION --- */
.crt-overlay { position: fixed; inset: 0; background: #fff; z-index: 9999; pointer-events: none; animation: crtOff 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
@keyframes crtOff {
    0% { opacity: 1; transform: scale(1, 1); }
    20% { opacity: 1; transform: scale(1, 0.01); }
    50% { opacity: 1; transform: scale(0, 0.01); }
    100% { opacity: 0; transform: scale(0, 0); }
}

/* --- VIDEO FEED --- */
#feed { position: fixed; inset: 8px; border-radius: var(--radius); overflow: hidden; background: var(--bg); }
.card { position: absolute; inset: 0; will-change: transform; transition: filter 0.2s ease-out; }
.card video { width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius); transition: object-fit 0.3s; opacity: 0; }
.card video.ready { opacity: 1; }
.card video.contain { object-fit: contain; }

/* --- UI LAYER (Fades out) --- */
.ui-layer { position: fixed; inset: 0; z-index: 10; pointer-events: none; transition: opacity 0.5s; display: flex; flex-direction: column; justify-content: space-between; padding: 16px; }
.ui-layer.faded { opacity: 0; }
.ui-layer > * { pointer-events: auto; }

/* --- HEADER & CATEGORIES --- */
.header { display: flex; justify-content: space-between; align-items: flex-start; }
.title { font-weight: 700; font-size: 1.2rem; letter-spacing: 2px; }
.cat-container { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
.cat-list { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; max-width: 70vw; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
.cat-list.open { opacity: 1; pointer-events: auto; }

/* --- BUTTONS --- */
button { background: var(--ui-bg); color: var(--tx); border: 1px solid var(--ui-border); padding: 8px 12px; border-radius: 8px; font-family: inherit; font-size: 0.75rem; font-weight: 700; cursor: pointer; backdrop-filter: blur(5px); text-transform: uppercase; transition: all 0.2s; }
button:active { transform: scale(0.95); }
button.active { background: var(--accent); color: var(--bg); }
button.warn { border-color: #ff3333; color: #ff3333; }

/* --- CONTROLS --- */
.controls-side { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 12px; }
.controls-bottom { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 8px; }
.video-title { font-size: 0.9rem; font-weight: 700; max-width: 60%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* --- SCRUBBER --- */
.scrubber-wrap { position: absolute; bottom: 0; left: 16px; right: 16px; height: 12px; }
input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
input[type=range]:focus { outline: none; }
input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: var(--ui-border); border-radius: 2px; }
input[type=range]::-webkit-slider-thumb { height: 12px; width: 12px; border-radius: 50%; background: var(--accent); cursor: pointer; -webkit-appearance: none; margin-top: -4px; }

/* --- SEEK ZONES --- */
.seek-zone { position: absolute; top: 20%; bottom: 20%; width: 30%; z-index: 5; pointer-events: auto; }
.seek-left { left: 0; }
.seek-right { right: 0; }
.seek-indicator { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: bold; background: rgba(0,0,0,0.5); color: #fff; padding: 10px 20px; border-radius: 20px; opacity: 0; transition: opacity 0.2s; pointer-events: none;}

/* --- OVERLAYS --- */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; color: #fff; }
.overlay.open { opacity: 1; pointer-events: auto; }
.pin-input { background: transparent; border: none; border-bottom: 2px solid #fff; color: #fff; font-family: inherit; font-size: 2rem; text-align: center; width: 150px; outline: none; margin: 20px 0; }
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--bg); padding: 10px 20px; border-radius: 20px; font-weight: bold; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
</style>
</head>
<body>

<div class="crt-overlay"></div>
<div id="feed"></div>

<div class="seek-zone seek-left" id="seekLeft"><div class="seek-indicator" id="indLeft">&laquo; REV</div></div>
<div class="seek-zone seek-right" id="seekRight"><div class="seek-indicator" id="indRight">FWD &raquo;</div></div>

<div class="ui-layer" id="uiLayer">
    <div class="header">
        <div class="title" id="appTitle">VOIDSCROLL</div>
        <div class="cat-container">
            <button id="btnCatToggle">[ CATEGORIES ]</button>
            <div class="cat-list" id="catList">
                <button class="cat-btn active" data-cat="all">ALL</button>
                <button class="cat-btn" data-cat="space">SPACE</button>
                <button class="cat-btn" data-cat="science">SCIENCE</button>
                <button class="cat-btn" data-cat="animals">ANIMALS</button>
            </div>
        </div>
    </div>

    <div class="controls-side">
        <button id="btnMute">[ MUTE ]</button>
        <button id="btnFit">[ FIT ]</button>
        <button id="btnLock">[ SCROLL ]</button>
        <button id="btnKids">[ KIDS ]</button>
    </div>

    <div>
        <div class="controls-bottom">
            <div class="video-title" id="vidTitle">Loading...</div>
            <button id="btnShare">[ SHARE ]</button>
        </div>
        <div class="scrubber-wrap">
            <input type="range" id="scrubber" value="0" min="0" max="100">
        </div>
    </div>
</div>

<div class="overlay" id="pinOverlay">
    <h2 id="pinText">ENTER PIN</h2>
    <input type="password" class="pin-input" id="pinInput" inputmode="numeric" maxlength="4">
    <p style="font-size: 0.8rem; opacity: 0.7;">Press Enter to confirm</p>
</div>

<div class="toast" id="toast">Copied to clipboard!</div>

<script>
// --- STATE ---
let allVideos = [], currentPlaylist = [], currentIndex = 0;
let isKidsMode = false, savedPin = null, scrollLocked = false, isMuted = true, isFit = false;
let curCard = null, curVideo = null;
let uiTimeout, transitioning = false;

// Elements
const feed = document.getElementById('feed');
const uiLayer = document.getElementById('uiLayer');
const scrubber = document.getElementById('scrubber');
const vidTitle = document.getElementById('vidTitle');
const appTitle = document.getElementById('appTitle');

async function init() {
    await loadData();
    const params = new URLSearchParams(window.location.search);
    const sharedId = params.get('vid');
    if (sharedId) {
        const idx = currentPlaylist.findIndex(v => v.id === sharedId);
        if (idx !== -1) currentIndex = idx;
    }
    renderCard(currentIndex, "none");
    resetUiTimer();
}

async function loadData() {
    // Decide which JSON file to fetch
    const file = isKidsMode ? 'kids_videos.json' : 'videos.json';
    console.log("Loading file:", file); // Debug: make sure correct file is fetched

    try {
        const res = await fetch(file);
        if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
        allVideos = await res.json();

        // Ensure we have at least one video
        if (!Array.isArray(allVideos) || allVideos.length === 0) {
            throw new Error("JSON is empty or invalid format");
        }

    } catch (e) {
        console.error("Failed to load JSON:", e);
        // Fallback dummy video
        allVideos = [{
            id: "dummy",
            title: "Run scraper to get videos",
            url: "https://www.w3schools.com/html/mov_bbb.mp4",
            category: "all"
        }];
    }

    // After loading, reset the playlist to "all"
    filterCategory('all');
}

function filterCategory(cat) {
    currentPlaylist = cat === 'all' ? [...allVideos] : allVideos.filter(v => v.category === cat);
    currentPlaylist.sort(() => Math.random() - 0.5);
    currentIndex = 0;
    if (currentPlaylist.length > 0) renderCard(0, "none");
}

// --- INSTANT POOL RENDER ---
function renderCard(idx, dir) {
    if (!currentPlaylist[idx]) return;
    const item = currentPlaylist[idx];
    vidTitle.textContent = item.title;

    const card = document.createElement('div');
    card.className = 'card';
    
    // Animation positioning
    if (dir === "up") card.style.transform = 'translateY(100%)';
    else if (dir === "down") card.style.transform = 'translateY(-100%)';
    else card.style.transform = 'translateY(0)';

    const vid = document.createElement('video');
    vid.src = item.url;
    vid.loop = true; 
    vid.muted = isMuted; 
    vid.playsInline = true;
    vid.preload = "auto"; // The magic: pre-buffer
    
    if (isFit) vid.classList.add('contain');
    
    vid.onloadeddata = () => { 
        vid.classList.add('ready'); 
        if (card === curCard) vid.play(); 
    };
    
    vid.ontimeupdate = () => { 
        if(card === curCard && vid.duration) scrubber.value = (vid.currentTime / vid.duration) * 100;
    };
    
    vid.onerror = () => advance("up");

    card.appendChild(vid);
    feed.appendChild(card);

    setTimeout(() => { 
        card.style.transition = 'transform 0.4s cubic-bezier(0.23, 1, 0.32, 1)'; 
        card.style.transform = 'translateY(0)'; 
    }, 50);

    if (curCard) {
        const old = curCard;
        const oldVid = old.querySelector('video');
        old.style.transition = 'transform 0.4s cubic-bezier(0.23, 1, 0.32, 1)';
        old.style.transform = dir === "up" ? 'translateY(-100%)' : 'translateY(100%)';
        setTimeout(() => {
            oldVid.pause();
            oldVid.src = ""; 
            oldVid.load();
            old.remove();
        }, 400);
    }
    
    curCard = card;
    curVideo = vid;

    // PRELOAD NEIGHBORS (The Pool)
    preload(idx + 1); // Preload Next
    preload(idx - 1); // Preload Previous
}

function preload(targetIdx) {
    if (!currentPlaylist[targetIdx]) return;
    const link = document.createElement('link');
    link.rel = "preload";
    link.as = "video";
    link.href = currentPlaylist[targetIdx].url;
    document.head.appendChild(link);
    // Cleanup old preloads
    const preloads = document.head.querySelectorAll('link[rel="preload"]');
    if (preloads.length > 5) preloads[0].remove();
}

function advance(dir) {
    if (transitioning || currentPlaylist.length === 0) return;
    const next = dir === "up" ? currentIndex + 1 : currentIndex - 1;
    if (next < 0 || next >= currentPlaylist.length) return;
    transitioning = true;
    currentIndex = next;
    renderCard(currentIndex, dir);
    setTimeout(() => transitioning = false, 450);
}

// UI & Gestures (Same as your provided code, just kept clean)
let startY = 0, currentY = 0;
window.addEventListener('touchstart', e => { if (!scrollLocked) startY = e.touches[0].clientY; });
window.addEventListener('touchmove', e => {
    if (scrollLocked || !curCard) return;
    currentY = e.touches[0].clientY - startY;
    curCard.style.transition = 'none';
    curCard.style.transform = `translateY(${currentY}px)`;
    curCard.style.filter = `blur(${Math.min(Math.abs(currentY)/20, 10)}px)`;
});
window.addEventListener('touchend', () => {
    if (scrollLocked || !curCard) return;
    curCard.style.transition = 'transform 0.4s cubic-bezier(0.23, 1, 0.32, 1), filter 0.2s';
    curCard.style.filter = 'blur(0px)';
    if (Math.abs(currentY) > 100) advance(currentY < 0 ? "up" : "down");
    else curCard.style.transform = 'translateY(0)';
    currentY = 0;
});

function resetUiTimer() {
    uiLayer.classList.remove('faded');
    clearTimeout(uiTimeout);
    uiTimeout = setTimeout(() => uiLayer.classList.add('faded'), 3500);
}
window.addEventListener('touchstart', resetUiTimer);
window.addEventListener('mousemove', resetUiTimer);

scrubber.addEventListener('input', e => {
    if (curVideo && curVideo.duration) curVideo.currentTime = (e.target.value / 100) * curVideo.duration;
});

document.getElementById('btnCatToggle').onclick = () => document.getElementById('catList').classList.toggle('open');
document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filterCategory(btn.dataset.cat);
        document.getElementById('catList').classList.remove('open');
    }
});

document.getElementById('btnMute').onclick = (e) => {
    isMuted = !isMuted;
    if (curVideo) curVideo.muted = isMuted;
    e.target.classList.toggle('active', !isMuted);
};

document.getElementById('btnFit').onclick = (e) => {
    isFit = !isFit;
    if (curVideo) curVideo.classList.toggle('contain', isFit);
    e.target.classList.toggle('active', isFit);
};

document.getElementById('btnLock').onclick = (e) => {
    scrollLocked = !scrollLocked;
    e.target.classList.toggle('warn', scrollLocked);
};

document.getElementById('btnShare').onclick = () => {
    const url = new URL(window.location.href);
    url.searchParams.set('vid', currentPlaylist[currentIndex].id);
    navigator.clipboard.writeText(url.toString()).then(() => {
        const t = document.getElementById('toast');
        t.style.opacity = 1;
        setTimeout(() => t.style.opacity = 0, 2000);
    });
};

// Seek Zones
let seekInterval;
function handleSeek(dir, indId) {
    if(!curVideo) return;
    document.getElementById(indId).style.opacity = 1;
    seekInterval = setInterval(() => { curVideo.currentTime += (dir === 'fwd' ? 2 : -2); }, 100);
}
function stopSeek(indId) {
    clearInterval(seekInterval);
    document.getElementById(indId).style.opacity = 0;
}

const sRight = document.getElementById('seekRight'), sLeft = document.getElementById('seekLeft');
sRight.addEventListener('touchstart', () => handleSeek('fwd', 'indRight'));
sRight.addEventListener('touchend', () => stopSeek('indRight'));
sLeft.addEventListener('touchstart', () => handleSeek('rev', 'indLeft'));
sLeft.addEventListener('touchend', () => stopSeek('indLeft'));

// Kids Mode
const btnKids = document.getElementById('btnKids'), pinOverlay = document.getElementById('pinOverlay'), pinInput = document.getElementById('pinInput');
btnKids.onclick = () => { pinOverlay.classList.add('open'); pinInput.focus(); document.getElementById('pinText').textContent = isKidsMode ? "ENTER PIN TO UNLOCK" : "SET PIN FOR KIDS MODE"; };

pinInput.onkeydown = async (e) => {
    if (e.key === "Enter") {
        const val = pinInput.value.trim();
        if (!val) return;

        if (!isKidsMode) {
            // Setting Kids Mode
            savedPin = val;
            isKidsMode = true;
            document.body.classList.add('kids-mode');
            btnKids.classList.add('warn');
            appTitle.textContent = "VOID KIDS";
            document.getElementById('btnCatToggle').style.display = 'none';

            console.log("Switching to Kids Mode");
            await loadData(); // <-- Load kids_videos.json

        } else {
            // Unlocking back to normal mode
            if (val === savedPin) {
                isKidsMode = false;
                document.body.classList.remove('kids-mode');
                btnKids.classList.remove('warn');
                appTitle.textContent = "VOIDSCROLL";
                document.getElementById('btnCatToggle').style.display = 'block';

                console.log("Switching to Normal Mode");
                await loadData(); // <-- Load videos.json
            } else {
                alert("Incorrect PIN");
            }
        }

        pinOverlay.classList.remove('open');
        pinInput.value = "";
    }
};

init();
</script>
</body>
</html>
